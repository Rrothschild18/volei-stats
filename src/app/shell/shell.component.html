<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav border-r! border-outline-variant/50! bg-surface-container-low! shadow-none!"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/sessoes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>event</mat-icon>
        <span>Sessões</span>
      </a>
      <a mat-list-item routerLink="/jogadores" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span>Jogadores</span>
      </a>
      <a mat-list-item routerLink="/campeonatos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>emoji_events</mat-icon>
        <span>Campeonatos</span>
      </a>
      <a mat-list-item routerLink="/historico" routerLinkActive="active-link">
        <mat-icon matListItemIcon>history</mat-icon>
        <span>Histórico</span>
      </a>
      <a mat-list-item routerLink="/rankings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>leaderboard</mat-icon>
        <span>Rankings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
        {{ title.getTitle() }}
      </h2>
    </mat-toolbar>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
